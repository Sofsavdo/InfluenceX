# Railway config-as-code - InfluenceX API xizmati.
# Railway dashboard'da sozlash: yangi xizmat yarating, shu repo'ni ulang,
# "Root Directory" = "/" (repo ildizi - packages/shared'ga kirish uchun SHART),
# "Config File Path" = "apps/api/railway.toml" (shu fayl).
[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# NestJS'da hali maxsus /health endpoint yo'q - eng oddiy tekshiruv sifatida
# hozircha ildiz prefiksga so'rov yuboriladi. Kelajakda GET /api/v1/health
# (doim 200 qaytaradigan) qo'shish tavsiya etiladi.
healthcheckPath = "/api/v1"
healthcheckTimeout = 100
