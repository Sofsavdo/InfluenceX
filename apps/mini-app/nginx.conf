# Telegram Mini App - Single Page Application. Barcha noma'lum yo'llar
# index.html'ga yo'naltiriladi (react-router-dom client-side routing uchun shart -
# aks holda /profile kabi to'g'ridan-to'g'ri havolalar 404 qaytaradi).
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Statik assetlar uzoq muddat keshlanadi (Vite fayl nomlariga hash qo'shadi,
    # shuning uchun keshni tozalash muammosi yo'q - fayl o'zgarsa, nomi ham o'zgaradi).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
