# Railway config-as-code - InfluenceX Mini App (Telegram WebApp, statik SPA).
# Root Directory = "/" , Config File Path = "apps/mini-app/railway.toml".
# MUHIM: VITE_API_BASE_URL build-vaqti o'zgaruvchisi (Railway "Build Variables"
# bo'limida beriladi) - runtime env emas, chunki Vite uni statik JS'ga yozadi.
[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/mini-app/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/"
healthcheckTimeout = 30
